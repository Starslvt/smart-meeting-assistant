{% extends 'meetings/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-upload me-2"></i>Nueva reunión</h3>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ form.title.label }}</label>
                    {{ form.title }}
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">{{ form.audio_file.label }}</label>
                    {{ form.audio_file }}
                    <div class="form-text">Formatos: MP3, WAV, M4A, OGG</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-upload me-2"></i>Subir reunión
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
